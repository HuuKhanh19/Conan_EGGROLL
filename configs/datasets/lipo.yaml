# Lipophilicity Dataset Configuration

dataset:
  name: "lipo"
  file: "refined_Lipophilicity.csv"
  smiles_column: "smiles"
  target_column: "measured"
  task_type: "regression"
  metric: "rmse"

# EGGROLL settings for this dataset
eggroll:
  batch_size: 128  # 128/3360 = 3.8% of training data
  
# Expected baseline performance
expected:
  rmse: 0.62