# Base configuration for CONAN Project

# Data settings
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]  # train/valid/test
  split_method: "scaffold"
  random_seed: 42

# UniMol settings
unimol:
  use_gpu: true
  conformer_num: 10
  
# Training settings (Step 1 - Gradient Descent)
training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0001
  early_stopping_patience: 10
  save_checkpoints: true

# EGGROLL settings (Step 2) - TUNED VALUES
# KEY LEARNINGS:
# - sigma: 0.01 is correct for pretrained 47M param models (0.05 destroys weights!)
# - population_size: 512 gives much better gradient estimates than 128
# - rank: 1 is sufficient when N×r >= 512 (max layer dim)
# - rank_transform: critical for stability with mini-batch noise
# - num_generations: 400 needed, model still improving at 200
#
eggroll:
  # Core parameters - TUNED
  population_size: 16     # N: larger = better gradient estimate
  rank: 32                  # r: N×r=512 >= max_layer_dim, sufficient for full-rank
  sigma: 0.01              # σ: KEEP SMALL for pretrained models!
  learning_rate: 0.1      # α: works well with rank_transform
  
  # Training
  num_generations: 400     # Increased from 200 (model still improving)
  batch_size: 128          # Mini-batch size for fitness evaluation
  use_antithetic: true     # Use mirrored sampling (±ε)
  
  # Fitness shaping - CRITICAL for stability
  normalize_fitness: true  # Z-score normalization (fallback)
  rank_transform: true     # ENABLED - prevents outlier domination
  centered_rank: true      # Center ranks around 0 [-0.5, 0.5]
  
  # Decay & patience
  weight_decay: 0.0        # L2 regularization
  lr_decay: 0.99          # Slight LR decay per generation
  sigma_decay: 0.99       # Slight sigma decay per generation
  patience: 200            # Increased from 50 (allow more exploration)

# GP settings (Step 3 Co-evolution)
gp:
  population_size: 50       # GP population size
  max_depth: 4              # Max tree depth
  tournament_size: 5        # Tournament selection size
  crossover_prob: 0.8       # Crossover probability
  mutation_prob: 0.2        # Mutation probability
  elitism: 3                # Elite individuals to keep
  input_dim: 512            # UniMol embedding dimension

# Experiment settings
experiment:
  output_dir: "experiments"
  log_level: "INFO"